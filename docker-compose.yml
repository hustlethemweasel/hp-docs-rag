services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: hpdocs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hpdocs"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest:
    build: ./backend
    command: python -m app.ingest
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/hpdocs
    volumes:
      - ./docs:/docs:ro
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/hpdocs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  ollama:
    profiles: [local]
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    # Model pull happens on first use; pre-pull with:
    #   docker compose --profile local exec ollama ollama pull qwen3.5:4b

  # locust service arrives in Milestone 6 (profile: loadtest)

volumes:
  pgdata:
  ollama:
