name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Format (Black)
        run: uv run black --check src tests migrations
      - name: Lint (ruff)
        run: uv run ruff check src tests migrations
      - name: Types (pyrefly)
        run: uv run pyrefly check
      - name: Fast suite + coverage gate
        run: uv run pytest --cov=app

  slow-suite:
    # Real collaborators per the constitution: actual Postgres + pgvector.
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: hpdocs
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d hpdocs"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/hpdocs
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Slow suite
        run: uv run pytest -m slow --no-cov

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
