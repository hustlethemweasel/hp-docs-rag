min_version = "2024.1.0"

[tools]
node = "22"

[env]
_.file = ".env"

[tasks.install]
description = "Install backend dependencies"
dir = "backend"
run = "uv sync"

[tasks.fmt]
description = "Check Black formatting (matches CI)"
dir = "backend"
run = "uv run black --check src tests migrations"

[tasks."fmt:fix"]
description = "Apply Black formatting"
dir = "backend"
run = "uv run black src tests migrations"

[tasks.lint]
description = "Lint with ruff (matches CI)"
dir = "backend"
run = "uv run ruff check src tests migrations"

[tasks."lint:fix"]
description = "Lint with ruff, applying fixes"
dir = "backend"
run = "uv run ruff check --fix src tests migrations"

[tasks.typecheck]
description = "Type-check with pyrefly"
dir = "backend"
run = "uv run pyrefly check"

[tasks.test]
description = "Fast suite with the coverage gate"
dir = "backend"
run = "uv run pytest --cov=app"

[tasks."test:slow"]
description = "Slow suite against real Postgres (needs `docker compose up db`)"
dir = "backend"
env = { DATABASE_URL = "postgresql+asyncpg://app:app@localhost:5432/hpdocs" }
run = "uv run pytest -m slow --no-cov"

[tasks.check]
description = "Full quality gate: fmt + lint + typecheck + fast suite (mirrors CI)"
depends = ["fmt", "lint", "typecheck", "test"]

[tasks.eval]
description = "Retrieval eval against an ingested database"
dir = "."
run = "uv run --project backend python -m eval.retrieval"

[tasks."eval:quality"]
description = "Response-quality benchmark (golden set + LLM-as-judge) against an ingested database"
dir = "."
run = "uv run --project backend python -m eval.run"

[tasks."eval:rerank"]
description = "Cross-encoder re-ranker spike against an ingested database"
dir = "."
run = "uv run --project backend python -m eval.rerank_experiment"

[tasks."frontend:install"]
description = "Install frontend dependencies"
dir = "frontend"
run = "npm ci"

[tasks."frontend:fmt"]
description = "Check Prettier formatting (matches CI)"
dir = "frontend"
run = "npm run fmt"

[tasks."frontend:fmt:fix"]
description = "Apply Prettier formatting"
dir = "frontend"
run = "npm run fmt:fix"

[tasks."frontend:lint"]
description = "Lint with ESLint (matches CI)"
dir = "frontend"
run = "npm run lint"

[tasks."frontend:typecheck"]
description = "Type-check with tsc"
dir = "frontend"
run = "npm run typecheck"

[tasks."frontend:test"]
description = "Vitest suite"
dir = "frontend"
run = "npm run test"

[tasks."frontend:check"]
description = "Full frontend quality gate: fmt + lint + typecheck + test (mirrors CI)"
depends = ["frontend:fmt", "frontend:lint", "frontend:typecheck", "frontend:test"]
